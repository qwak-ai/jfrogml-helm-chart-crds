replicaCount: 1
mode: client
tunnel:
  client:
    backoff:
      initialIntervalMillis: 1000
      maxIntervalMillis: 12000
      multiplier: 2
    bridges:
      jfrogml:
        concurrency: 4
        type: jfrogml
        local:
          anonymousEndpoints:
            - .*/system/(ping|readiness|liveness)
            - .*/v1/cert/root
            - .*/v1/registry/join
            - .*/v1/config/shared
        remote:
          url: https://bridge.qwak.com:10443
image:
  registry: releases-docker.jfrog.io
  repository: jfrog/bridge
  tag: 1.72.0
router:
  serviceRegistry:
    insecure: true
extraSystemYaml:
  bridge:
    jfConnectClient:
      centralAccessTokenService: "generic"
    logging:
      request:
        verbose: false
        tokenIdLoggingEnabled: false
      application:
        level: info
